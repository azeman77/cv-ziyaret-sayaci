<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Kurumsal Görev Paneli">
    <title>Corporate Task Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard-container">
        <!-- Header -->
        <header class="header">
            <div>
                <h1>Görev Paneli</h1>
                <p>Kurumsal iş takip ve yönetim sistemi</p>
            </div>
            <div class="header-actions">
                <button id="open-modal-btn" class="btn btn-primary" aria-label="Yeni Görev Ekle">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    Yeni Görev Ekla
                </button>
            </div>
        </header>

        <!-- Stats Section -->
        <section class="stats-section">
            <div class="stat-card">
                <div class="stat-icon total-icon">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
                </div>
                <div class="stat-info">
                    <h3>Toplam Görev</h3>
                    <p id="stat-total">0</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon pending-icon">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                </div>
                <div class="stat-info">
                    <h3>Devam Eden</h3>
                    <p id="stat-pending">0</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon completed-icon">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                </div>
                <div class="stat-info">
                    <h3>Tamamlanan</h3>
                    <p id="stat-completed">0</p>
                </div>
            </div>
        </section>

        <!-- Main Content (Task List) -->
        <main class="main-content">
            <div class="task-list-header">
                <h2>Güncel Görevler</h2>
                <div class="filters">
                    <button class="filter-btn active" data-filter="all">Tümü</button>
                    <button class="filter-btn" data-filter="pending">Devam Edenler</button>
                    <button class="filter-btn" data-filter="completed">Tamamlananlar</button>
                </div>
            </div>
            
            <!-- Tasks Container -->
            <div id="tasks-container" class="tasks-container">
                <!-- Görev kartları JavaScript ile buraya eklenecektir -->
            </div>
        </main>
    </div>

    <!-- Modal Form -->
    <div id="task-modal" class="modal" aria-hidden="true">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Yeni Görev Oluştur</h2>
                <button id="close-modal-btn" class="close-btn" aria-label="Kapat">&times;</button>
            </div>
            <form id="task-form">
                <div class="form-group">
                    <label for="task-title">Görev Başlığı</label>
                    <input type="text" id="task-title" required placeholder="Örn: Q3 Finansal Raporu">
                </div>
                <div class="form-group">
                    <label for="task-desc">Açıklama</label>
                    <textarea id="task-desc" required placeholder="Görevin detaylarını buraya girin..." rows="4"></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" id="cancel-btn" class="btn btn-secondary">İptal</button>
                    <button type="submit" class="btn btn-primary">Kaydet</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
